services:
  - type: web
    runtime: static
    name: rythmologue
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    routes:
      # SPA fallback — React Router handles client-side routes
      - type: rewrite
        source: /*
        destination: /index.html
